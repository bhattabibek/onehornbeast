<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Chart.js for Pie Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom CSS -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #f4f7fa;
      color: #333;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #4e73df;
      color: #fff;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .sidebar:hover {
      width: 260px;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar-header img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #fff;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-menu li {
      margin: 15px 0;
    }

    .sidebar-menu a {
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 10px;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    .sidebar-menu a:hover {
      background: #3b5bb5;
    }

    .sidebar-menu i {
      margin-right: 10px;
    }

    .main-content {
      flex: 1;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .metric-card:hover {
      transform: translateY(-5px);
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: #4e73df;
    }

    .metric-card:nth-child(2)::before {
      background: #ff6384;
    }

    .metric-card:nth-child(3)::before {
      background: #36a2eb;
    }

    .metric-card:nth-child(4)::before {
      background: #ffce56;
    }

    .metric-card i {
      font-size: 30px;
      margin-bottom: 10px;
      color: #4e73df;
    }

    .metric-card h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #555;
    }

    .metric-card p {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .metric-card span {
      font-size: 14px;
      color: #888;
    }

    .metric-card .change {
      font-size: 14px;
      color: #4caf50;
      font-weight: bold;
    }

    .metric-card .change.negative {
      color: #f44336;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .chart-card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 80px;
      }

      .sidebar:hover {
        width: 90px;
      }

      .sidebar-header img {
        width: 50px;
        height: 50px;
      }

      .sidebar-menu a span {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
 
        <h3>One Horn Beast</h3>
      </div>
      <ul class="sidebar-menu">
        <li><a href="#"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
        <li><a href="#"><i class="fas fa-chart-pie"></i><span>Analytics</span></a></li>
        <li><a href="#"><i class="fas fa-users"></i><span>Users</span></a></li>
        <li><a href="#"><i class="fas fa-cog"></i><span>Settings</span></a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="header">
        <h1>Dashboard</h1>
        <button>Refresh</button>
      </div>

      <!-- Metrics -->
      <div class="metrics">
        <div class="metric-card">
          <i class="fas fa-users"></i>
          <h3>Total Users</h3>
          <p>1,234</p>
          <span>Last 30 Days</span>
          <p class="change">+5.2% <i class="fas fa-arrow-up"></i></p>
        </div>
        <div class="metric-card">
          <i class="fas fa-dollar-sign"></i>
          <h3>Revenue</h3>
          <p>$12,345</p>
          <span>Last 30 Days</span>
          <p class="change">+12.4% <i class="fas fa-arrow-up"></i></p>
        </div>
        <div class="metric-card">
          <i class="fas fa-project-diagram"></i>
          <h3>Active Projects</h3>
          <p>45</p>
          <span>Last 30 Days</span>
          <p class="change negative">-2.1% <i class="fas fa-arrow-down"></i></p>
        </div>
        <div class="metric-card">
          <i class="fas fa-tasks"></i>
          <h3>Tasks Completed</h3>
          <p>78%</p>
          <span>Last 30 Days</span>
          <p class="change">+8.3% <i class="fas fa-arrow-up"></i></p>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts">
        <div class="chart-card">
          <canvas id="pieChart"></canvas>
        </div>
        <div class="chart-card">
          <canvas id="barChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Chart.js Script -->
  <script>
    // Pie Chart
    const pieChart = new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels: ['Red', 'Blue', 'Yellow'],
        datasets: [{
          data: [300, 50, 100],
          backgroundColor: ['#ff6384', '#36a2eb', '#ffce56'],
        }],
      },
    });

    // Bar Chart
    const barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: ['January', 'February', 'March', 'April', 'May'],
        datasets: [{
          label: 'Sales',
          data: [65, 59, 80, 81, 56],
          backgroundColor: '#4e73df',
        }],
      },
    });
  </script>
</body>
</html>
